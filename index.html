<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 아이 성장 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F3F1E6;
    --card: #FFFFFE;
    --ink: #23342B;
    --ink-soft: #56655C;
    --sage: #4F7859;
    --sage-light: #DCE7DE;
    --mustard: #E3A857;
    --mustard-light: #FBEBD3;
    --berry: #9C5A6B;
    --line: #DEDACB;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(35,52,43,0.07), 0 1px 2px rgba(35,52,43,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces','Apple SD Gothic Neo','Malgun Gothic',serif;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'Space Mono',monospace;}
  a{color:inherit;}
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    background:none;
  }
  input,textarea{
    font-family:inherit;
    font-size:15px;
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  input:focus,textarea:focus{outline:2px solid var(--sage);outline-offset:1px;}
  label{font-size:13px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:5px;}
  .field{margin-bottom:14px;}

  /* ---------- App shell ---------- */
  #app{max-width:760px;margin:0 auto;padding:0 16px 100px;}
  header.top{
    position:sticky;top:0;z-index:20;
    background:var(--bg);
    padding:18px 0 12px;
    border-bottom:1px solid var(--line);
    margin-bottom:18px;
  }
  header.top .row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  header.top h1{font-size:22px;margin:0;font-weight:700;color:var(--ink);}
  header.top .age{font-size:13px;color:var(--sage);font-weight:600;}
  .tabs{display:flex;gap:6px;margin-top:14px;}
  .tab{
    flex:1;text-align:center;padding:9px 6px;border-radius:10px;
    font-size:13.5px;font-weight:600;color:var(--ink-soft);
  }
  .tab.active{background:var(--sage);color:#fff;}

  /* ---------- Setup screen ---------- */
  .setup-wrap{max-width:420px;margin:60px auto;padding:0 20px;}
  .setup-card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:28px 24px;
  }
  .setup-card h2{margin:0 0 6px;font-size:22px;}
  .setup-card p.sub{color:var(--ink-soft);font-size:13.5px;margin:0 0 20px;line-height:1.5;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:11px 18px;border-radius:10px;font-weight:600;font-size:14.5px;
    background:var(--sage);color:#fff;width:100%;
  }
  .btn.secondary{background:var(--sage-light);color:var(--sage);}
  .btn.ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line);}
  .btn.danger{background:#F4E4E7;color:var(--berry);}
  .msg{font-size:13px;margin-top:10px;padding:10px 12px;border-radius:8px;line-height:1.5;}
  .msg.error{background:#F6E4E4;color:#8A3B3B;}
  .msg.ok{background:var(--sage-light);color:var(--sage);}
  details.help{margin-top:16px;font-size:13px;color:var(--ink-soft);}
  details.help summary{cursor:pointer;font-weight:600;color:var(--sage);}
  details.help ol{padding-left:18px;line-height:1.7;}
  details.help code{background:var(--sage-light);padding:1px 5px;border-radius:4px;}

  /* ---------- Timeline (growth ruler) ---------- */
  .timeline{position:relative;padding-left:34px;margin-top:8px;}
  .timeline::before{
    content:"";position:absolute;left:14px;top:4px;bottom:4px;width:2px;
    background:repeating-linear-gradient(var(--sage),var(--sage) 6px,transparent 6px,transparent 12px);
  }
  .entry{position:relative;margin-bottom:26px;}
  .entry .tick{
    position:absolute;left:-34px;top:6px;width:30px;height:30px;
    background:var(--card);border:2px solid var(--sage);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--sage);
    z-index:2;
  }
  .entry-card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:16px 18px;
  }
  .entry-card .date-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .entry-card .date{font-weight:700;font-size:15px;}
  .entry-card .age-tag{font-size:12px;color:var(--ink-soft);}
  .entry-card .stats{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;}
  .stat-pill{
    font-family:'Space Mono',monospace;font-size:12.5px;font-weight:700;
    background:var(--mustard-light);color:#8A6416;padding:4px 10px;border-radius:20px;
  }
  .entry-card .diary{font-size:14.5px;line-height:1.65;color:var(--ink);white-space:pre-wrap;margin:8px 0 10px;}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:6px;margin-top:8px;}
  .photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;background:var(--sage-light);cursor:pointer;}
  .photo-grid .ph-loading{width:100%;aspect-ratio:1;border-radius:8px;background:var(--sage-light);}
  .entry-actions{display:flex;justify-content:flex-end;gap:14px;margin-top:8px;}
  .entry-actions button{font-size:12.5px;color:var(--ink-soft);font-weight:600;}
  .entry-actions button.del{color:var(--berry);}

  .share-ratio-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .share-ratio-toggle button{
    flex:1;padding:8px;border-radius:20px;font-size:12.5px;font-weight:600;
    color:var(--ink-soft);background:var(--card);border:1.5px solid var(--line);
  }
  .share-ratio-toggle button.active{background:var(--sage);color:#fff;border-color:var(--sage);}
  .share-preview-outer{display:flex;justify-content:center;margin-bottom:16px;}
  .share-preview-wrap{
    position:relative;width:260px;border-radius:16px;overflow:hidden;background:#111;
  }
  .share-preview-wrap.ratio-square{aspect-ratio:1/1;}
  .share-preview-wrap.ratio-story{aspect-ratio:9/16;}
  .share-preview-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .share-preview-overlay{
    position:absolute;left:0;right:0;bottom:0;height:55%;
    background:linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
  }
  .share-preview-text{
    position:absolute;left:0;right:0;bottom:0;padding:18px 16px;color:#fff;
  }
  .share-preview-text .sp-age{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;opacity:0.9;margin-bottom:4px;}
  .share-preview-text .sp-date{font-family:'Fraunces',serif;font-size:17px;font-weight:700;margin-bottom:6px;}
  .share-preview-text .sp-diary{font-size:12.5px;line-height:1.5;opacity:0.95;}
  .share-photo-picker{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
  .share-photo-picker img{
    width:52px;height:52px;object-fit:cover;border-radius:8px;cursor:pointer;
    border:2px solid transparent;opacity:0.55;
  }
  .share-photo-picker img.selected{border-color:var(--sage);opacity:1;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .empty-state .display{font-size:19px;color:var(--ink);margin-bottom:6px;}

  .view-toggle{display:flex;gap:6px;margin-bottom:14px;}
  .view-toggle-btn{
    flex:1;text-align:center;padding:8px 6px;border-radius:20px;font-size:12.5px;font-weight:600;
    color:var(--ink-soft);background:var(--card);border:1.5px solid var(--line);
  }
  .view-toggle-btn.active{background:var(--sage);color:#fff;border-color:var(--sage);}
  .compare-entry-btn{width:100%;margin-bottom:16px;}

  .compare-wrap{
    position:relative;width:100%;aspect-ratio:1;border-radius:14px;overflow:hidden;
    background:#111;touch-action:none;user-select:none;margin-bottom:14px;
  }
  .compare-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
  .compare-after{z-index:1;}
  .compare-before{z-index:2;}
  .compare-handle{
    position:absolute;top:0;bottom:0;width:3px;background:#fff;z-index:3;left:50%;
    box-shadow:0 0 6px rgba(0,0,0,0.4);pointer-events:none;
  }
  .compare-handle::after{
    content:"↔";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:36px;height:36px;border-radius:50%;background:#fff;color:var(--sage);
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;
    box-shadow:0 2px 8px rgba(0,0,0,0.3);
  }
  .compare-label{
    position:absolute;bottom:10px;z-index:4;background:rgba(0,0,0,0.55);color:#fff;
    font-size:11.5px;padding:4px 10px;border-radius:14px;pointer-events:none;
  }
  .compare-label.left{left:10px;}
  .compare-label.right{right:10px;}
  .compare-picker-row{display:flex;gap:10px;margin-bottom:14px;}
  .compare-picker-row .field{flex:1;margin-bottom:0;}
  .compare-picker-row select{font-size:13px;}

  .year-summary-cover{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:12px;margin-bottom:14px;background:var(--sage-light);}
  .summary-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .summary-stat{background:var(--card);border-radius:10px;padding:12px;text-align:center;}
  .summary-stat .num{font-family:'Space Mono',monospace;font-size:19px;font-weight:700;color:var(--sage);display:block;}
  .summary-stat .lbl{font-size:11.5px;color:var(--ink-soft);}
  .summary-section-title{font-size:13px;font-weight:700;color:var(--ink);margin:14px 0 6px;}
  .summary-milestone-row{display:flex;gap:8px;font-size:13px;padding:6px 0;border-bottom:1px solid var(--line);}
  .summary-milestone-row .d{font-family:'Space Mono',monospace;font-size:11.5px;color:var(--ink-soft);white-space:nowrap;}

  .year-block{margin-bottom:6px;}
  .year-group-header{
    width:100%;display:flex;align-items:center;gap:8px;
    background:var(--card);border-radius:12px;box-shadow:var(--shadow);
    padding:10px 10px 10px 16px;margin:14px 0 4px;
  }
  .year-group-header.open{margin-bottom:0;border-radius:12px 12px 0 0;}
  .year-group-toggle{
    flex:1;display:flex;align-items:center;gap:10px;background:none;border:none;padding:0;text-align:left;
    font-family:'Fraunces',serif;font-weight:700;font-size:16px;color:var(--ink);
  }
  .year-group-count{font-family:'Inter',sans-serif;font-weight:600;font-size:12px;color:var(--ink-soft);}
  .year-summary-btn{
    font-size:12px;font-weight:600;color:var(--sage);background:var(--sage-light);
    padding:6px 10px;border-radius:16px;white-space:nowrap;
  }
  .year-group-chevron{color:var(--sage);font-size:14px;}
  .year-block .timeline{
    background:var(--bg);padding:14px 16px 14px 34px;border-radius:0 0 12px 12px;margin-bottom:10px;
  }

  .month-group-header{
    font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--sage);
    margin:22px 0 10px 2px;text-transform:uppercase;letter-spacing:0.02em;
    display:flex;align-items:baseline;gap:8px;
  }
  .month-group-header:first-child{margin-top:2px;}
  .month-group-count{font-family:'Inter',sans-serif;font-weight:600;font-size:11px;color:var(--ink-soft);text-transform:none;}
  .milestone-badge{
    display:inline-block;background:var(--mustard);color:#fff;font-size:12px;font-weight:700;
    padding:3px 10px;border-radius:20px;margin-bottom:8px;
  }
  .memory-section{margin-bottom:24px;}
  .memory-title{font-family:'Fraunces',serif;font-size:15px;font-weight:700;color:var(--berry);margin-bottom:10px;}
  .memory-card{margin-bottom:12px;position:relative;}
  .memory-card::before{
    content:"";position:absolute;left:-6px;top:0;bottom:0;width:3px;background:var(--berry);border-radius:2px;
  }
  .memory-card .entry-card{margin-left:8px;}
  .memory-years{
    font-family:'Space Mono',monospace;font-size:11.5px;font-weight:700;color:var(--berry);
    margin:0 0 4px 8px;
  }

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:20px;bottom:24px;z-index:30;
    width:58px;height:58px;border-radius:50%;background:var(--sage);color:#fff;
    box-shadow:0 6px 18px rgba(79,120,89,0.4);font-size:28px;
    display:flex;align-items:center;justify-content:center;
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(35,52,43,0.45);z-index:40;
    display:flex;align-items:flex-end;justify-content:center;
  }
  @media(min-width:600px){.overlay{align-items:center;}}
  .sheet{
    background:var(--bg);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;
    border-radius:20px 20px 0 0;padding:22px 20px 28px;
  }
  @media(min-width:600px){.sheet{border-radius:20px;}}
  .sheet h2{margin:0 0 16px;font-size:20px;}
  .sheet .row2{display:flex;gap:10px;}
  .sheet .row2 .field{flex:1;}
  .photo-input-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .photo-input-preview img{width:64px;height:64px;object-fit:cover;border-radius:8px;}
  .file-btn{
    border:1.5px dashed var(--line);border-radius:10px;padding:14px;text-align:center;
    color:var(--ink-soft);font-size:13.5px;font-weight:600;
  }
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-actions .btn{flex:1;}

  /* ---------- Chart tab ---------- */
  .chart-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;}
  .chart-card h3{margin:0 0 8px;font-size:15px;}
  .insight-line{font-size:13px;color:var(--ink-soft);line-height:1.6;margin:0 0 14px;}
  .insight-line b{color:var(--sage);font-family:'Space Mono',monospace;font-weight:700;}
  .insight-empty{font-size:13px;color:var(--ink-soft);margin:0 0 14px;}
  .who-legend{font-size:11.5px;color:var(--ink-soft);margin-top:8px;}
  .chart-canvas-wrap{position:relative;height:220px;}
  canvas{max-width:100%;}

  /* ---------- Settings ---------- */
  .settings-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;}
  .settings-card h3{margin:0 0 12px;font-size:15px;}
  .kv{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-bottom:1px solid var(--line);}
  .kv:last-child{border-bottom:none;}
  .kv .k{color:var(--ink-soft);}
  .kv .v{font-family:'Space Mono',monospace;font-size:12.5px;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13.5px;
    z-index:60;box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .spinner{
    width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;
    border-radius:50%;display:inline-block;animation:spin 0.7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .lightbox{position:fixed;inset:0;background:rgba(10,15,12,0.92);z-index:70;display:flex;align-items:center;justify-content:center;}
  .lightbox img{max-width:92%;max-height:88%;border-radius:8px;transition:opacity 0.15s;}
  .lb-close{
    position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,0.15);color:#fff;font-size:18px;z-index:2;
  }
  .lb-nav{
    position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,0.15);color:#fff;font-size:26px;line-height:1;z-index:2;
  }
  .lb-prev{left:12px;}
  .lb-next{right:12px;}
  .lb-counter{
    position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,0.15);color:#fff;font-family:'Space Mono',monospace;
    font-size:12.5px;padding:4px 12px;border-radius:20px;
  }
</style>
</head>
<body>

<div id="root"></div>

<script>
/* ============================================================
   우리 아이 성장 기록 — GitHub 저장소를 백엔드로 쓰는 단일 페이지 앱
   ============================================================ */

const LS_KEY = "growth_app_config_v1";
const state = {
  config: null,        // {owner, repo, branch, token}
  meta: {childName:"", birthDate:""},
  metaSha: null,
  entries: [],
  entriesSha: null,
  tab: "timeline",
  loading: false,
  photoCache: {},       // path -> object URL
  timelineView: "all",  // "all" | "byYear"
  expandedYears: null,  // Set, lazily initialized
};

function loadConfig(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){ return null; }
}
function saveConfig(cfg){ localStorage.setItem(LS_KEY, JSON.stringify(cfg)); }
function clearConfig(){ localStorage.removeItem(LS_KEY); }

function apiHeaders(raw){
  const h = {
    "Authorization": "Bearer " + state.config.token,
    "X-GitHub-Api-Version": "2022-11-28",
  };
  h["Accept"] = raw ? "application/vnd.github.raw" : "application/vnd.github+json";
  return h;
}
function contentsUrl(path){
  const c = state.config;
  return `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${path}`;
}

async function ghGetJson(path){
  const res = await fetch(contentsUrl(path) + `?ref=${state.config.branch}`, {headers: apiHeaders(false)});
  if(res.status === 404) return {json:null, sha:null};
  if(!res.ok) throw new Error("GitHub 읽기 실패 ("+res.status+")");
  const data = await res.json();
  const text = b64ToUtf8(data.content);
  return {json: JSON.parse(text), sha: data.sha};
}
async function ghGetRawBlob(path){
  const res = await fetch(contentsUrl(path) + `?ref=${state.config.branch}`, {headers: apiHeaders(true)});
  if(!res.ok) throw new Error("사진 로드 실패");
  return await res.blob();
}
async function ghPutJson(path, obj, sha, message){
  const body = {
    message: message,
    content: utf8ToB64(JSON.stringify(obj, null, 2)),
    branch: state.config.branch,
  };
  if(sha) body.sha = sha;
  const res = await fetch(contentsUrl(path), {
    method:"PUT", headers: apiHeaders(false), body: JSON.stringify(body)
  });
  if(!res.ok){ const t = await res.text(); throw new Error("저장 실패: "+t); }
  return await res.json();
}
async function ghPutBinary(path, base64Content, message){
  const body = {message: message, content: base64Content, branch: state.config.branch};
  const res = await fetch(contentsUrl(path), {method:"PUT", headers: apiHeaders(false), body: JSON.stringify(body)});
  if(!res.ok){ const t = await res.text(); throw new Error("사진 업로드 실패: "+t); }
  return await res.json();
}
async function ghDelete(path, sha, message){
  const res = await fetch(contentsUrl(path), {
    method:"DELETE", headers: apiHeaders(false),
    body: JSON.stringify({message, sha, branch: state.config.branch})
  });
  return res.ok;
}

function utf8ToB64(str){
  return btoa(unescape(encodeURIComponent(str)));
}
function b64ToUtf8(b64){
  return decodeURIComponent(escape(atob(b64.replace(/\n/g,""))));
}
function arrayBufferToBase64(buffer){
  let binary = "";
  const bytes = new Uint8Array(buffer);
  const chunk = 0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
  }
  return btoa(binary);
}

/* ---------- Image compression ---------- */
function compressImage(file, maxDim=1400, quality=0.78){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let {width, height} = img;
      if(width > height && width > maxDim){ height = Math.round(height * maxDim/width); width = maxDim; }
      else if(height > maxDim){ width = Math.round(width * maxDim/height); height = maxDim; }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        if(!blob) return reject(new Error("이미지 변환 실패"));
        blob.arrayBuffer().then(buf => resolve({blob, base64: arrayBufferToBase64(buf)}));
      }, "image/jpeg", quality);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---------- Age helper ---------- */
function ageAt(birthDateStr, dateStr){
  if(!birthDateStr) return "";
  const b = new Date(birthDateStr), d = new Date(dateStr);
  let days = Math.round((d-b)/86400000);
  if(days < 0) return "";
  if(days < 60) return `생후 ${days}일`;
  const months = Math.floor(days/30.44);
  if(months < 24) return `생후 ${months}개월`;
  const years = Math.floor(months/12);
  const rem = months%12;
  return `${years}세${rem?` ${rem}개월`:""}`;
}

/* ============================================================
   Rendering
   ============================================================ */
const root = document.getElementById("root");

function render(){
  if(!state.config){ renderSetup(); return; }
  renderApp();
}

function el(html){
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  if(t.content.children.length > 1){
    const wrap = document.createElement("div");
    while(t.content.firstChild) wrap.appendChild(t.content.firstChild);
    return wrap;
  }
  return t.content.firstElementChild;
}

/* ---------- Setup screen ---------- */
function renderSetup(prefill, errorMsg){
  root.innerHTML = "";
  const wrap = el(`
    <div class="setup-wrap">
      <div class="setup-card">
        <h2 class="display">🌱 우리 아이 성장 기록</h2>
        <p class="sub">사진과 기록은 GitHub의 비공개 저장소에 안전하게 보관돼요. 저장소 정보와 개인 액세스 토큰(Personal Access Token)을 입력해서 연결하세요. 토큰은 이 기기 브라우저에만 저장되고 외부로 전송되지 않아요.</p>
        <div class="field"><label>GitHub 사용자명 (owner)</label><input id="f-owner" placeholder="예: minsu-kim"></div>
        <div class="field"><label>저장소 이름 (repo)</label><input id="f-repo" placeholder="예: our-baby-growth"></div>
        <div class="field"><label>브랜치</label><input id="f-branch" value="main"></div>
        <div class="field"><label>Personal Access Token</label><input id="f-token" type="password" placeholder="github_pat_..."></div>
        <button class="btn" id="connect-btn">연결하기</button>
        <div id="setup-msg"></div>
        <details class="help">
          <summary>처음이신가요? 5분 설정 가이드 보기</summary>
          <ol>
            <li>github.com에서 <b>New repository</b> 클릭 → 이름(예: our-baby-growth) 입력 → <b>Private</b> 선택 → 생성</li>
            <li>우측 상단 프로필 → <b>Settings → Developer settings → Personal access tokens → Fine-grained tokens → Generate new token</b></li>
            <li>Repository access에서 방금 만든 저장소만 선택, Permissions에서 <b>Contents: Read and write</b> 로 설정 후 생성</li>
            <li>생성된 토큰(<code>github_pat_...</code>)을 복사해서 위에 붙여넣기</li>
            <li>배우자분은 저장소 <b>Settings → Collaborators</b>에서 초대 → 배우자분이 본인 계정으로 로그인해 수락 → 배우자분도 본인 토큰을 만들어 이 화면에서 같은 owner/repo로 연결하면 됨</li>
          </ol>
        </details>
      </div>
    </div>
  `);
  root.appendChild(wrap);
  if(prefill){
    wrap.querySelector("#f-owner").value = prefill.owner||"";
    wrap.querySelector("#f-repo").value = prefill.repo||"";
    wrap.querySelector("#f-branch").value = prefill.branch||"main";
  }
  if(errorMsg){
    wrap.querySelector("#setup-msg").innerHTML = `<div class="msg error">${errorMsg}</div>`;
  }
  wrap.querySelector("#connect-btn").onclick = async () => {
    const owner = wrap.querySelector("#f-owner").value.trim();
    const repo = wrap.querySelector("#f-repo").value.trim();
    const branch = wrap.querySelector("#f-branch").value.trim() || "main";
    const token = wrap.querySelector("#f-token").value.trim();
    if(!owner||!repo||!token){
      wrap.querySelector("#setup-msg").innerHTML = `<div class="msg error">모든 항목을 입력해주세요.</div>`;
      return;
    }
    const btn = wrap.querySelector("#connect-btn");
    btn.innerHTML = `<span class="spinner"></span> 확인 중...`;
    const cfg = {owner, repo, branch, token};
    state.config = cfg;
    try{
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {headers: apiHeaders(false)});
      if(!res.ok) throw new Error(res.status === 404 ? "저장소를 찾을 수 없어요. owner/repo 이름을 확인해주세요." : "연결 실패 (토큰 권한을 확인해주세요)");
      saveConfig(cfg);
      await bootstrapData();
      render();
    }catch(e){
      state.config = null;
      wrap.querySelector("#connect-btn").textContent = "연결하기";
      wrap.querySelector("#setup-msg").innerHTML = `<div class="msg error">${e.message}</div>`;
    }
  };
}

async function bootstrapData(){
  const metaRes = await ghGetJson("data/config.json");
  if(metaRes.json){ state.meta = metaRes.json; state.metaSha = metaRes.sha; }
  else{ state.meta = {childName:"", birthDate:""}; state.metaSha = null; }

  const entRes = await ghGetJson("data/entries.json");
  if(entRes.json){ state.entries = entRes.json; state.entriesSha = entRes.sha; }
  else{ state.entries = []; state.entriesSha = null; }
}

function sortedEntries(){
  return [...state.entries].sort((a,b)=> b.date.localeCompare(a.date));
}

function buildEntryCard(entry){
  const heightLabel = entry.height ? `${entry.height}` : "•";
  const card = el(`
    <div class="entry" data-id="${entry.id}">
      <div class="tick">${heightLabel}</div>
      <div class="entry-card">
        <div class="date-row">
          <div class="date">${formatDate(entry.date)}</div>
          <div class="age-tag">${ageAt(state.meta.birthDate, entry.date)}</div>
        </div>
        ${entry.milestone ? `<div class="milestone-badge">${escapeHtml(entry.milestone)}</div>` : ""}
        <div class="stats">
          ${entry.height ? `<span class="stat-pill">${entry.height} cm</span>`:""}
          ${entry.weight ? `<span class="stat-pill">${entry.weight} kg</span>`:""}
        </div>
        ${entry.diary ? `<div class="diary">${escapeHtml(entry.diary)}</div>` : ""}
        <div class="photo-grid"></div>
        <div class="entry-actions">
          ${(entry.photos&&entry.photos.length) ? `<button class="share">공유</button>` : ""}
          <button class="edit">수정</button>
          <button class="del">삭제</button>
        </div>
      </div>
    </div>
  `);
  const grid = card.querySelector(".photo-grid");
  const photoList = entry.photos||[];
  photoList.forEach((path, idx) => {
    const ph = el(`<div class="ph-loading"></div>`);
    grid.appendChild(ph);
    loadPhoto(path).then(url=>{
      const img = el(`<img src="${url}">`);
      img.onclick = ()=> openLightbox(photoList, idx);
      ph.replaceWith(img);
    }).catch(()=>{ ph.style.background = "#eee"; });
  });
  if(card.querySelector(".share")){
    card.querySelector(".share").onclick = () => openShareCardSheet(entry);
  }
  card.querySelector(".edit").onclick = () => openEditSheet(entry);
  card.querySelector(".del").onclick = () => deleteEntry(entry.id);
  return card;
}

function monthGroupLabel(dateStr){
  const d = new Date(dateStr);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월`;
}
function renderMonthGroupedList(entries){
  const tl = el(`<div class="timeline"></div>`);
  let lastGroup = null;
  entries.forEach(entry => {
    const group = monthGroupLabel(entry.date);
    if(group !== lastGroup){
      tl.appendChild(el(`<div class="month-group-header">${group} <span class="month-group-count">${entries.filter(e=>monthGroupLabel(e.date)===group).length}건</span></div>`));
      lastGroup = group;
    }
    tl.appendChild(buildEntryCard(entry));
  });
  return tl;
}

function renderTimeline(container){
  const entries = sortedEntries();
  if(entries.length === 0){
    container.appendChild(el(`
      <div class="empty-state">
        <div class="display">아직 기록이 없어요</div>
        <div>오른쪽 아래 ＋ 버튼을 눌러 첫 기록을 남겨보세요</div>
      </div>
    `));
    return;
  }

  // 전체 보기 / 연도별 보기 토글
  const toggle = el(`
    <div class="view-toggle">
      <button class="view-toggle-btn" data-mode="all">전체 보기</button>
      <button class="view-toggle-btn" data-mode="byYear">연도별 보기</button>
    </div>
  `);
  toggle.querySelectorAll(".view-toggle-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.mode === state.timelineView);
    b.onclick = () => { state.timelineView = b.dataset.mode; renderApp(); };
  });
  container.appendChild(toggle);

  const photoCount = entries.reduce((n,e)=> n + (e.photos?e.photos.length:0), 0);
  if(photoCount >= 2){
    const compareBtn = el(`<button class="btn secondary compare-entry-btn">📸 그때 vs 지금 비교하기</button>`);
    compareBtn.onclick = openCompareSheet;
    container.appendChild(compareBtn);
  }

  // "몇 년 전 오늘" 메모리 카드
  const today = new Date();
  const todayMM = today.getMonth(), todayDD = today.getDate();
  const memories = entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === todayMM && d.getDate() === todayDD && d.getFullYear() < today.getFullYear();
  }).sort((a,b)=> b.date.localeCompare(a.date));
  if(memories.length){
    const memWrap = el(`<div class="memory-section"><div class="memory-title">🕰️ 오늘의 기억</div></div>`);
    memories.forEach(m => {
      const yearsAgo = today.getFullYear() - new Date(m.date).getFullYear();
      const memCard = el(`<div class="memory-card"><div class="memory-years">${yearsAgo}년 전 오늘</div></div>`);
      const inner = buildEntryCard(m);
      inner.querySelector(".tick").remove();
      inner.style.marginBottom = "0";
      memCard.appendChild(inner.querySelector(".entry-card"));
      memWrap.appendChild(memCard);
    });
    container.appendChild(memWrap);
  }

  if(state.timelineView === "byYear"){
    const years = [...new Set(entries.map(e => new Date(e.date).getFullYear()))].sort((a,b)=> b-a);
    if(!state.expandedYears){
      state.expandedYears = new Set([years[0]]); // 가장 최근 연도는 기본으로 펼침
    }
    years.forEach(year => {
      const yearEntries = entries.filter(e => new Date(e.date).getFullYear() === year);
      const isOpen = state.expandedYears.has(year);
      const yearBlock = el(`
        <div class="year-block">
          <div class="year-group-header ${isOpen ? "open" : ""}">
            <button class="year-group-toggle">
              <span>${year}년</span>
              <span class="year-group-count">${yearEntries.length}건</span>
            </button>
            <button class="year-summary-btn">📖 요약</button>
            <span class="year-group-chevron">${isOpen ? "▾" : "▸"}</span>
          </div>
        </div>
      `);
      yearBlock.querySelector(".year-group-toggle").onclick = () => {
        if(state.expandedYears.has(year)) state.expandedYears.delete(year);
        else state.expandedYears.add(year);
        renderApp();
      };
      yearBlock.querySelector(".year-summary-btn").onclick = (e) => {
        e.stopPropagation();
        openYearSummarySheet(year, yearEntries);
      };
      if(isOpen){
        yearBlock.appendChild(renderMonthGroupedList(yearEntries));
      }
      container.appendChild(yearBlock);
    });
  }else{
    container.appendChild(renderMonthGroupedList(entries));
  }
}

async function loadPhoto(path){
  if(state.photoCache[path]) return state.photoCache[path];
  const blob = await ghGetRawBlob(path);
  const url = URL.createObjectURL(blob);
  state.photoCache[path] = url;
  return url;
}

function openLightbox(photos, startIndex){
  let idx = startIndex || 0;
  const multi = photos.length > 1;
  const lb = el(`
    <div class="lightbox">
      <button class="lb-close" aria-label="닫기">✕</button>
      ${multi ? `<button class="lb-nav lb-prev" aria-label="이전 사진">‹</button>` : ""}
      ${multi ? `<button class="lb-nav lb-next" aria-label="다음 사진">›</button>` : ""}
      <img>
      ${multi ? `<div class="lb-counter"></div>` : ""}
    </div>
  `);
  document.body.appendChild(lb);
  const imgEl = lb.querySelector("img");

  function render(){
    imgEl.style.opacity = "0.3";
    loadPhoto(photos[idx]).then(url=>{
      imgEl.src = url;
      imgEl.style.opacity = "1";
    }).catch(()=>{ imgEl.style.opacity = "1"; });
    const counter = lb.querySelector(".lb-counter");
    if(counter) counter.textContent = `${idx+1} / ${photos.length}`;
  }
  render();

  function go(delta){
    idx = (idx + delta + photos.length) % photos.length;
    render();
  }
  lb.querySelector(".lb-prev")?.addEventListener("click", e=>{ e.stopPropagation(); go(-1); });
  lb.querySelector(".lb-next")?.addEventListener("click", e=>{ e.stopPropagation(); go(1); });
  lb.querySelector(".lb-close").onclick = (e)=>{ e.stopPropagation(); requestClose(); };
  lb.onclick = (e) => { if(e.target === lb) requestClose(); };

  // 스와이프로 넘기기
  let touchStartX = null;
  lb.addEventListener("touchstart", e=>{ touchStartX = e.touches[0].clientX; }, {passive:true});
  lb.addEventListener("touchend", e=>{
    if(touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 40 && multi){ dx > 0 ? go(-1) : go(1); }
    touchStartX = null;
  }, {passive:true});

  // 키보드 방향키/ESC
  function onKey(e){
    if(e.key === "ArrowLeft" && multi) go(-1);
    else if(e.key === "ArrowRight" && multi) go(1);
    else if(e.key === "Escape") requestClose();
  }
  document.addEventListener("keydown", onKey);

  // 뒤로가기(안드로이드 포함) 시 앱 전체가 아니라 사진창만 닫히도록 히스토리 스택 활용
  history.pushState({ modal:"lightbox" }, "");
  let closedByPop = false;
  function onPopState(){
    closedByPop = true;
    cleanup();
  }
  window.addEventListener("popstate", onPopState);

  function cleanup(){
    document.removeEventListener("keydown", onKey);
    window.removeEventListener("popstate", onPopState);
    lb.remove();
  }
  function requestClose(){
    if(closedByPop) return;
    history.back(); // popstate가 발생하며 cleanup 실행됨
  }
}

/* 뒤로가기 버튼을 누르면 앱 전체가 아니라 이 오버레이만 닫히도록 처리하는 공용 헬퍼 */
function pushBackClosable(overlay, onClose){
  history.pushState({ modal:true }, "");
  let closedByPop = false;
  function onPopState(){ closedByPop = true; cleanup(); }
  window.addEventListener("popstate", onPopState);
  function cleanup(){
    window.removeEventListener("popstate", onPopState);
    overlay.remove();
    if(onClose) onClose();
  }
  return function requestClose(){
    if(closedByPop) return;
    history.back();
  };
}

/* ---------- 그때 vs 지금 비교 슬라이더 ---------- */
function getAllPhotoOptions(){
  const list = [];
  [...state.entries].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    (e.photos||[]).forEach((p, i)=>{
      list.push({
        date: e.date, path: p,
        label: (e.photos.length>1 ? `${formatDate(e.date)} (${i+1}/${e.photos.length})` : formatDate(e.date))
      });
    });
  });
  return list;
}
function openCompareSheet(){
  const options = getAllPhotoOptions();
  if(options.length < 2){ showToast("비교하려면 사진이 2장 이상 있어야 해요"); return; }
  let beforeIdx = 0, afterIdx = options.length-1;

  const overlay = el(`
    <div class="overlay">
      <div class="sheet">
        <h2 class="display">그때 vs 지금</h2>
        <div class="compare-picker-row">
          <div class="field"><label>이전 사진</label><select id="cmp-before"></select></div>
          <div class="field"><label>최근 사진</label><select id="cmp-after"></select></div>
        </div>
        <div class="compare-wrap">
          <img class="compare-after">
          <img class="compare-before">
          <div class="compare-label left"></div>
          <div class="compare-label right"></div>
          <div class="compare-handle"></div>
        </div>
        <div class="sheet-actions">
          <button class="btn ghost" id="cmp-close">닫기</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(overlay);

  const selBefore = overlay.querySelector("#cmp-before");
  const selAfter = overlay.querySelector("#cmp-after");
  options.forEach((o,i)=>{
    selBefore.appendChild(el(`<option value="${i}">${o.label}</option>`));
    selAfter.appendChild(el(`<option value="${i}">${o.label}</option>`));
  });
  selBefore.value = beforeIdx;
  selAfter.value = afterIdx;

  const wrap = overlay.querySelector(".compare-wrap");
  const imgBefore = overlay.querySelector(".compare-before");
  const imgAfter = overlay.querySelector(".compare-after");
  const handle = overlay.querySelector(".compare-handle");
  const labelLeft = overlay.querySelector(".compare-label.left");
  const labelRight = overlay.querySelector(".compare-label.right");
  let pct = 50;

  function setClip(){
    imgBefore.style.clipPath = `inset(0 ${100-pct}% 0 0)`;
    handle.style.left = pct + "%";
  }
  function loadSides(){
    const b = options[selBefore.value], a = options[selAfter.value];
    loadPhoto(b.path).then(url=> imgBefore.src = url).catch(()=>{});
    loadPhoto(a.path).then(url=> imgAfter.src = url).catch(()=>{});
    labelLeft.textContent = `${formatDate(b.date)} · ${ageAt(state.meta.birthDate, b.date)}`;
    labelRight.textContent = `${formatDate(a.date)} · ${ageAt(state.meta.birthDate, a.date)}`;
    setClip();
  }
  loadSides();
  selBefore.onchange = loadSides;
  selAfter.onchange = loadSides;

  function moveTo(clientX){
    const rect = wrap.getBoundingClientRect();
    pct = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
    setClip();
  }
  let dragging = false;
  wrap.addEventListener("pointerdown", e=>{ dragging = true; moveTo(e.clientX); });
  window.addEventListener("pointermove", e=>{ if(dragging) moveTo(e.clientX); });
  window.addEventListener("pointerup", ()=>{ dragging = false; });

  const requestClose = pushBackClosable(overlay);
  overlay.onclick = (e) => { if(e.target === overlay) requestClose(); };
  overlay.querySelector("#cmp-close").onclick = requestClose;
}

/* ---------- 연말 자동 요약 ---------- */
function computeYearSummary(year, yearEntries){
  const sorted = [...yearEntries].sort((a,b)=>a.date.localeCompare(b.date));
  const totalEntries = sorted.length;
  const totalPhotos = sorted.reduce((n,e)=> n + (e.photos?e.photos.length:0), 0);
  const heightVals = sorted.filter(e=>e.height!=null);
  const weightVals = sorted.filter(e=>e.weight!=null);
  const milestones = sorted.filter(e=>e.milestone).map(e=>({date:e.date, milestone:e.milestone}));
  const monthCounts = {};
  sorted.forEach(e=>{ const m = new Date(e.date).getMonth()+1; monthCounts[m] = (monthCounts[m]||0)+1; });
  let busiestMonth = null, busiestCount = 0;
  Object.entries(monthCounts).forEach(([m,c])=>{ if(c>busiestCount){ busiestCount=c; busiestMonth=m; } });
  let coverPhoto = null;
  for(let i=sorted.length-1; i>=0; i--){
    if(sorted[i].photos && sorted[i].photos.length){ coverPhoto = sorted[i].photos[0]; break; }
  }
  return {
    totalEntries, totalPhotos,
    heightFirst: heightVals[0]||null, heightLast: heightVals[heightVals.length-1]||null,
    weightFirst: weightVals[0]||null, weightLast: weightVals[weightVals.length-1]||null,
    milestones, busiestMonth, busiestCount, coverPhoto
  };
}
function openYearSummarySheet(year, yearEntries){
  const s = computeYearSummary(year, yearEntries);
  const name = state.meta.childName || "우리 아이";

  function changeLine(first, last, unit){
    if(!first) return `기록 없음`;
    if(first === last) return `${first[unit==="cm"?"height":"weight"]}${unit} (1건 기록)`;
    const fv = first[unit==="cm"?"height":"weight"], lv = last[unit==="cm"?"height":"weight"];
    const diff = Math.round((lv-fv)*10)/10;
    return `${fv}${unit} → ${lv}${unit} (${diff>=0?"+":""}${diff}${unit})`;
  }

  const overlay = el(`
    <div class="overlay">
      <div class="sheet" id="year-summary-content">
        <h2 class="display">${year}년, ${name}의 한 해</h2>
        ${s.coverPhoto ? `<img class="year-summary-cover">` : ""}
        <div class="summary-stat-grid">
          <div class="summary-stat"><span class="num">${s.totalEntries}</span><span class="lbl">총 기록</span></div>

      actions.style.display = "";
      msg.style.display = "";
      canvas.toBlob(blob=>{
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${name}_${year}년_요약.png`;

        a.click();
        a.remove();

}
function ensureHtml2Canvas(){
  if(window.html2canvas) return Promise.resolve();
  const sources = [
    "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js",
    "https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js",
    "https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"
  ];
  function tryLoad(i){
    return new Promise((resolve, reject)=>{
      if(i >= sources.length){ reject(new Error("모든 CDN 로딩 실패")); return; }
      const s = document.createElement("script");
      s.src = sources[i];
      s.onload = () => window.html2canvas ? resolve() : tryLoad(i+1).then(resolve, reject);
      s.onerror = () => tryLoad(i+1).then(resolve, reject);
      document.head.appendChild(s);
    });
  }
  return tryLoad(0);
}

function truncateText(s, max){
  if(!s) return "";
  return s.length > max ? s.slice(0, max).trim() + "…" : s;
}
function openShareCardSheet(entry){
  let photoIdx = 0;
  let ratio = "square"; // "square" | "story"

  const overlay = el(`
    <div class="overlay">
      <div class="sheet">
        <h2 class="display">카드로 공유하기</h2>
        <div class="share-ratio-toggle">
          <button data-ratio="square">피드용 (1:1)</button>
          <button data-ratio="story">스토리용 (9:16)</button>
        </div>
        <div class="share-preview-outer">
          <div class="share-preview-wrap ratio-square" id="share-preview">
            <img id="share-preview-img">
            <div class="share-preview-overlay"></div>
            <div class="share-preview-text">
              <div class="sp-age">${ageAt(state.meta.birthDate, entry.date)}</div>
              <div class="sp-date">${formatDate(entry.date)}</div>
              ${entry.diary ? `<div class="sp-diary">${escapeHtml(truncateText(entry.diary, 60))}</div>` : ""}
            </div>
          </div>
        </div>
        ${entry.photos.length > 1 ? `<div class="share-photo-picker" id="share-photo-picker"></div>` : ""}
        <div class="sheet-actions">
          <button class="btn ghost" id="share-close">닫기</button>
          <button class="btn" id="share-go">공유하기</button>
        </div>
        <div id="share-msg"></div>
      </div>
    </div>
  `);
  document.body.appendChild(overlay);

  const previewImg = overlay.querySelector("#share-preview-img");
  function setPhoto(idx){
    photoIdx = idx;
    loadPhoto(entry.photos[idx]).then(url=>{ previewImg.src = url; }).catch(()=>{});
    const picker = overlay.querySelector("#share-photo-picker");
    if(picker){
      picker.querySelectorAll("img").forEach((im,i)=> im.classList.toggle("selected", i===idx));
    }
  }
  setPhoto(0);

  if(entry.photos.length > 1){
    const picker = overlay.querySelector("#share-photo-picker");
    entry.photos.forEach((path, idx) => {
      const thumb = el(`<img class="${idx===0?"selected":""}">`);
      picker.appendChild(thumb);
      loadPhoto(path).then(url=>{ thumb.src = url; }).catch(()=>{});
      thumb.onclick = () => setPhoto(idx);
    });
  }

  const preview = overlay.querySelector("#share-preview");
  overlay.querySelectorAll(".share-ratio-toggle button").forEach(b=>{
    b.classList.toggle("active", b.dataset.ratio === ratio);
    b.onclick = () => {
      ratio = b.dataset.ratio;
      preview.classList.toggle("ratio-square", ratio === "square");
      preview.classList.toggle("ratio-story", ratio === "story");
      overlay.querySelectorAll(".share-ratio-toggle button").forEach(x=>x.classList.toggle("active", x===b));
    };
  });

  const requestClose = pushBackClosable(overlay);
  overlay.onclick = (e) => { if(e.target === overlay) requestClose(); };
  overlay.querySelector("#share-close").onclick = requestClose;

  overlay.querySelector("#share-go").onclick = async () => {
    const btn = overlay.querySelector("#share-go");
    btn.innerHTML = `<span class="spinner"></span> 만드는 중...`;
    try{
      await ensureHtml2Canvas();
      const canvas = await html2canvas(preview, {backgroundColor:"#111", useCORS:true});
      canvas.toBlob(async (blob) => {
        const fileName = `${state.meta.childName||"우리아이"}_${entry.date}.png`;
        const file = new File([blob], fileName, {type:"image/png"});
        if(navigator.canShare && navigator.canShare({files:[file]})){
          try{
            await navigator.share({files:[file], title: fileName});
            btn.textContent = "공유하기";
            return;
          }catch(e){
            // 사용자가 공유 취소한 경우 등은 조용히 무시
            if(e.name === "AbortError"){ btn.textContent = "공유하기"; return; }
          }
        }
        // navigator.share 미지원 브라우저 → 다운로드로 대체
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = fileName;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url), 3000);
        showToast("이미지로 저장했어요. 원하는 앱에서 공유해보세요 📤");
        btn.textContent = "공유하기";
      });
    }catch(e){
      overlay.querySelector("#share-msg").innerHTML = `<div class="msg error">카드를 만들지 못했어요: ${e.message}</div>`;
      btn.textContent = "공유하기";
    }
  };
}

function formatDate(dateStr){
  const d = new Date(dateStr);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function ageInMonthsFloat(birthDateStr, dateStr){
  const b = new Date(birthDateStr), d = new Date(dateStr);
  return (d - b) / 86400000 / 30.4368;
}
function whoRowAt(table, ageMonths){
  const clamped = Math.max(0, Math.min(60, ageMonths));
  const lo = Math.floor(clamped), hi = Math.ceil(clamped);
  if(lo === hi) return table[lo];
  const t = clamped - lo;
  const a = table[lo], b = table[hi];
  const lerp = k => a[k] + (b[k]-a[k])*t;
  return {p3:lerp("p3"), p15:lerp("p15"), p50:lerp("p50"), p85:lerp("p85"), p97:lerp("p97")};
}
function percentileBandLabel(value, row){
  if(value < row.p3) return "3번째 백분위 미만";
  if(value < row.p15) return "3~15번째 백분위";
  if(value < row.p50) return "15~50번째 백분위";
  if(value < row.p85) return "50~85번째 백분위";
  if(value < row.p97) return "85~97번째 백분위";
  return "97번째 백분위 초과";
}

/* ---------- Chart tab ---------- */
function computeInsight(sortedVals, key, unit){
  // sortedVals: entries sorted ascending by date, each has [key] set
  if(sortedVals.length === 0) return null;
  const last = sortedVals[sortedVals.length-1];
  const first = sortedVals[0];
  const daysSpan = (new Date(last.date) - new Date(first.date)) / 86400000;
  const totalChange = last[key] - first[key];
  const perMonth = daysSpan >= 20 ? (totalChange / (daysSpan/30.44)) : null;
  let sincePrev = null, prevDate = null;
  if(sortedVals.length >= 2){
    const prev = sortedVals[sortedVals.length-2];
    sincePrev = last[key] - prev[key];
    prevDate = prev.date;
  }
  return {
    lastVal: last[key], lastDate: last.date,
    totalChange, perMonth, sincePrev, prevDate,
    count: sortedVals.length
  };
}
function fmtSigned(n, unit){
  if(n === null || n === undefined || isNaN(n)) return "";
  const s = n > 0 ? "+" : "";
  return `${s}${Math.round(n*10)/10}${unit}`;
}
function renderChart(container){
  const entries = [...state.entries].sort((a,b)=> a.date.localeCompare(b.date)).filter(e=>e.height||e.weight);
  if(entries.length === 0){
    container.appendChild(el(`<div class="empty-state"><div class="display">아직 키/몸무게 기록이 없어요</div><div>기록을 추가할 때 키와 몸무게를 입력해보세요</div></div>`));
    return;
  }
  const heightVals = entries.filter(e=>e.height!=null);
  const weightVals = entries.filter(e=>e.weight!=null);
  const hInsight = computeInsight(heightVals, "height", "cm");
  const wInsight = computeInsight(weightVals, "weight", "kg");
  const hasBirth = !!state.meta.birthDate;

  function insightHtml(insight, unit, label, whoTable){
    if(!insight) return `<p class="insight-empty">${label} 기록이 아직 없어요</p>`;
    let lines = [`최근 ${formatDate(insight.lastDate)} 기준 <b>${insight.lastVal}${unit}</b>`];
    if(insight.sincePrev !== null){
      lines.push(`이전 기록(${formatDate(insight.prevDate)}) 대비 <b>${fmtSigned(insight.sincePrev, unit)}</b>`);
    }
    if(insight.perMonth !== null){
      lines.push(`측정 시작 이후 월평균 <b>${fmtSigned(insight.perMonth, unit)}</b> 성장`);
    }
    if(hasBirth && whoTable){
      const ageM = ageInMonthsFloat(state.meta.birthDate, insight.lastDate);
      if(ageM >= 0 && ageM <= 60){
        const row = whoRowAt(whoTable, ageM);
        lines.push(`또래(WHO 여아 기준) 중 <b>${percentileBandLabel(insight.lastVal, row)}</b>`);
      }
    }
    return `<p class="insight-line">${lines.join(" · ")}</p>`;
  }

  container.appendChild(el(`
    <div class="chart-card">
      <h3>키 (cm)</h3>
      ${insightHtml(hInsight, "cm", "키", WHO_GIRLS_HEIGHT)}
      <div class="chart-canvas-wrap"><canvas id="height-chart"></canvas></div>
      ${hasBirth ? `<div class="who-legend">회색 점선: WHO 여아 또래 기준 (3~97번째 백분위) · <span style="color:var(--sage);font-weight:700;">●</span> 우리 아이</div>` : `<p class="insight-empty">설정 탭에서 생년월일을 입력하면 또래 성장 곡선과 비교돼요</p>`}
    </div>
    <div class="chart-card">
      <h3>몸무게 (kg)</h3>
      ${insightHtml(wInsight, "kg", "몸무게", WHO_GIRLS_WEIGHT)}
      <div class="chart-canvas-wrap"><canvas id="weight-chart"></canvas></div>
      ${hasBirth ? `<div class="who-legend">회색 점선: WHO 여아 또래 기준 (3~97번째 백분위) · <span style="color:var(--mustard);font-weight:700;">●</span> 우리 아이</div>` : ""}
    </div>
    ${hasBirth ? `<p class="insight-empty" style="margin-top:-6px;">※ WHO 성장 표준(여아, 0~60개월) 기준 참고용이며 의학적 진단이 아니에요. 정확한 평가는 소아과 진료를 받아보세요.</p>` : ""}
  `));
  ensureChartJs().then(()=>{
    if(heightVals.length) drawChart("height-chart", heightVals, "height", "#4F7859", hasBirth ? WHO_GIRLS_HEIGHT : null);
    if(weightVals.length) drawChart("weight-chart", weightVals, "weight", "#E3A857", hasBirth ? WHO_GIRLS_WEIGHT : null);
  }).catch(()=>{
    container.querySelectorAll(".chart-canvas-wrap").forEach(w=>{
      w.innerHTML = `<p class="insight-empty">차트 라이브러리를 불러오지 못했어요. 인터넷 연결을 확인해주세요.</p>`;
    });
  });
}
function ensureChartJs(){
  if(window.Chart) return Promise.resolve();
  const sources = [
    "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js",
    "https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js",
    "https://unpkg.com/chart.js@4.4.4/dist/chart.umd.min.js"
  ];
  function tryLoad(i){
    return new Promise((resolve, reject)=>{
      if(i >= sources.length){ reject(new Error("모든 CDN 로딩 실패")); return; }
      const s = document.createElement("script");
      s.src = sources[i];
      s.onload = () => window.Chart ? resolve() : tryLoad(i+1).then(resolve, reject);
      s.onerror = () => tryLoad(i+1).then(resolve, reject);
      document.head.appendChild(s);
    });
  }
  return tryLoad(0);
}
function drawChart(canvasId, entryList, key, color, whoTable){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const hasBirth = !!state.meta.birthDate;
  const datasets = [];

  if(whoTable){
    // build percentile reference lines across the age range actually needed (0 to max child age, capped 60)
    const maxAge = Math.min(60, Math.max(24, Math.ceil(Math.max(...entryList.map(e=>ageInMonthsFloat(state.meta.birthDate, e.date))))+2));
    const months = [];
    for(let m=0; m<=maxAge; m++) months.push(m);
    const mkLine = (field, dash, width) => ({
      label: field, data: months.map(m=>({x:m, y:whoTable[m][field]})),
      borderColor:"#B9B4A2", borderWidth:width, borderDash:dash, pointRadius:0, fill:false, tension:0.25, order:2
    });
    datasets.push(mkLine("p97",[2,3],1));
    datasets.push(mkLine("p85",[2,3],1));
    datasets.push(mkLine("p50",[5,3],1.5));
    datasets.push(mkLine("p15",[2,3],1));
    datasets.push(mkLine("p3",[2,3],1));
  }

  const childData = hasBirth
    ? entryList.map(e => ({x: ageInMonthsFloat(state.meta.birthDate, e.date), y: e[key]}))
    : entryList.map((e,i) => ({x:i, y:e[key]}));
  datasets.push({
    label:"우리 아이", data: childData,
    borderColor:color, backgroundColor:color+"33", tension:0.3, spanGaps:true,
    pointRadius:5, pointHoverRadius:6, borderWidth:3, fill:false, order:1
  });

  new Chart(canvas, {
    type:"line",
    data:{datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      parsing:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title: (items)=> hasBirth ? `${Math.round(items[0].parsed.x*10)/10}개월` : "",
            label: (item)=> item.dataset.label==="우리 아이" ? `우리 아이: ${item.parsed.y}` : `${item.dataset.label}: ${item.parsed.y}`
          }
        }
      },
      scales:{
        x:{
          type:"linear",
          title:{display:hasBirth, text:hasBirth ? "개월 수" : ""},
          ticks:{ callback:(v)=> hasBirth ? Math.round(v) : "" }
        },
        y:{ beginAtZero:false }
      }
    }
  });
}

    const milestoneSel = milestoneSelectEl.value;
    const milestone = milestoneSel === "✏️ 직접 입력" ? milestoneCustomEl.value.trim() : milestoneSel;
    if(!date){ overlay.querySelector("#edit-msg").innerHTML = `<div class="msg error">날짜를 선택해주세요.</div>`; return; }
    const btn = overlay.querySelector("#save-edit");
    btn.innerHTML = `<span class="spinner"></span> 저장 중...`;
    try{
      const newPhotoPaths = [];
      for(const file of editPendingPhotos){
        const {base64} = await compressImage(file);
        const fname = `photos/${date}-${Date.now()}-${Math.random().toString(36).slice(2,7)}.jpg`;
        await ghPutBinary(fname, base64, `사진 추가(수정): ${date}`);
        newPhotoPaths.push(fname);
      }
      const keptPhotos = (entry.photos||[]).filter(p => !editRemovedPhotos.includes(p));
      const updatedEntry = {
        ...entry,
        date,
        height: isNaN(height) ? null : height,
        weight: isNaN(weight) ? null : weight,
        diary,
        milestone: milestone || null,
        photos: [...keptPhotos, ...newPhotoPaths],
        updatedAt: new Date().toISOString()
      };
      const fresh = await ghGetJson("data/entries.json");
      const list = fresh.json || [];
      const idx = list.findIndex(e2 => e2.id === entry.id);
      if(idx === -1) list.push(updatedEntry); else list[idx] = updatedEntry;
      const res = await ghPutJson("data/entries.json", list, fresh.sha, `기록 수정: ${date}`);
      state.entries = list;
      state.entriesSha = res.content.sha;
      for(const p of editRemovedPhotos){
        try{
          const info = await fetch(contentsUrl(p)+`?ref=${state.config.branch}`, {headers:apiHeaders(false)}).then(r=>r.json());
          await ghDelete(p, info.sha, `사진 삭제(수정): ${p}`);
          delete state.photoCache[p];
        }catch(e){ /* ignore */ }
      }
      overlay.remove();
      showToast("수정했어요 🌱");
      renderApp();
    }catch(e){
      overlay.querySelector("#edit-msg").innerHTML = `<div class="msg error">${e.message}</div>`;
      btn.textContent = "수정 저장";
    }
  };
}

async function deleteEntry(id){
  if(!confirm("이 기록을 삭제할까요? 사진도 함께 삭제돼요.")) return;
  showToast("삭제 중...");
  try{
    const fresh = await ghGetJson("data/entries.json");
    const list = fresh.json || [];
    const target = list.find(e=>e.id===id);
    const remaining = list.filter(e=>e.id!==id);
    const res = await ghPutJson("data/entries.json", remaining, fresh.sha, `기록 삭제: ${id}`);
    state.entries = remaining;
    state.entriesSha = res.content.sha;
    if(target && target.photos){
      for(const p of target.photos){
        try{
          const info = await fetch(contentsUrl(p)+`?ref=${state.config.branch}`, {headers:apiHeaders(false)}).then(r=>r.json());
          await ghDelete(p, info.sha, `사진 삭제: ${p}`);
        }catch(e){/* ignore */}
      }
    }
    showToast("삭제했어요");
    renderApp();
  }catch(e){
    showToast("삭제 실패: "+e.message);
  }
}

function showToast(msg){
  const t = el(`<div class="toast">${msg}</div>`);
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

/* ---------- Boot ---------- */
(async function init(){
  const cfg = loadConfig();
  if(cfg){
    state.config = cfg;
    root.innerHTML = `<div class="setup-wrap"><div class="setup-card" style="text-align:center;"><span class="spinner" style="border-color:rgba(79,120,89,0.3);border-top-color:var(--sage);"></span><p class="sub" style="margin-top:12px;">불러오는 중...</p></div></div>`;
    try{
      await bootstrapData();
      render();
    }catch(e){
      state.config = null;
      renderSetup(cfg, "다시 연결해주세요: "+e.message);
    }
  }else{
    renderSetup();
  }
})();
</script>
